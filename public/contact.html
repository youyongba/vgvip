<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 | Web3 VIP社群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #0a0a16;
            color: #fff;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(60, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(131, 56, 236, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }
        /* 头部导航 - 复用原有样式 */
        .header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3c82f6, #8338ec);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-link {
            color: #b0b0c0;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: #3c82f6;
        }
        .nav-link.active {
            color: #fff;
            font-weight: 500;
        }

        /* 联系我们核心区域 */
        .contact-section {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }
        
        /* 左侧：联系信息 */
        .contact-info h1 {
            font-size: 2.5rem;
            line-height: 1.3;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #3c82f6, #8338ec);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .contact-info p {
            color: #b0b0c0;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .method-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .method-card:hover {
            transform: translateX(5px);
            border-color: rgba(60, 130, 246, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }
        .method-icon {
            width: 48px;
            height: 48px;
            background: rgba(60, 130, 246, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3c82f6;
            font-size: 1.5rem;
        }
        .method-details h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: #fff;
        }
        .method-details span {
            color: #b0b0c0;
            font-size: 0.9rem;
        }

        /* 右侧：留言表单 */
        .contact-form-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .form-title {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            color: #b0b0c0;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .form-input, .form-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            color: #fff;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: #3c82f6;
        }
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3c82f6, #8338ec);
            border: none;
            border-radius: 8px;
            padding: 1rem;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }

        /* 底部 - 复用原有样式 */
        .footer {
            padding: 2rem 5%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }

        /* 响应式适配 */
        @media (max-width: 900px) {
            .contact-section {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
            .contact-info h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">W3</div>
            <div class="logo-text">Web3 VIP社群</div>
        </div>
        <nav class="nav-links">
            <a href="/vip" class="nav-link">会员订阅</a>
            <a href="/benefits" class="nav-link">社群权益</a>
            <a href="/faq" class="nav-link">常见问题</a>
            <a href="/contact" class="nav-link active">联系我们</a>
        </nav>
    </header>

    <!-- 联系我们核心区域 -->
    <section class="contact-section">
        <!-- 左侧信息 -->
        <div class="contact-info">
            <h1>需要帮助？<br>我们随时为您服务</h1>
            <p>无论是关于会员订阅的疑问，还是商务合作意向，或者是对社群的建议，欢迎随时联系我们。我们的团队通常会在 24 小时内回复。</p>
            
            <div class="contact-methods">
                <a href="https://t.me/your_support_bot" target="_blank" class="method-card">
                    <div class="method-icon">
                        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" width="24" height="24" alt="Telegram">
                    </div>
                    <div class="method-details">
                        <h3>Telegram 客服</h3>
                        <span>@Web3VIP_Support (推荐)</span>
                    </div>
                </a>
                
                <a href="mailto:support@web3vip.com" class="method-card">
                    <div class="method-icon">✉️</div>
                    <div class="method-details">
                        <h3>电子邮件</h3>
                        <span>support@web3vip.com</span>
                    </div>
                </a>

                <a href="#" class="method-card">
                    <div class="method-icon">🤝</div>
                    <div class="method-details">
                        <h3>商务合作</h3>
                        <span>business@web3vip.com</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- 右侧表单 -->
        <div class="contact-form-container">
            <h2 class="form-title">在线留言</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label class="form-label">您的称呼 / Telegram ID</label>
                    <input type="text" class="form-input" placeholder="例如：@username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">联系邮箱</label>
                    <input type="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">留言内容</label>
                    <textarea class="form-textarea" placeholder="请详细描述您遇到的问题或建议..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">发送留言</button>
            </form>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
        © 2025 Web3 VIP社群 - 所有数据通过web3.storage备份，链上可查
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.submit-btn');
            const originalText = btn.innerText;
            
            btn.innerText = '发送中...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            // 模拟发送请求
            setTimeout(() => {
                alert('留言已发送！我们会尽快通过 Telegram 或邮件联系您。');
                this.reset();
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }, 1500);
        });
    </script>
</body>
</html>
